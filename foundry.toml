[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = ["reactive-lib/=lib/reactive-lib/src/"]
test = "test"
script = "script"
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
unichain_sepolia = "https://1301.rpc.thirdweb.com"
ethereum_sepolia = "https://ethereum-sepolia-rpc.publicnode.com"
base_sepolia = "https://84532.rpc.thirdweb.com"
reactive_kopli = "https://lasna-rpc.rnk.dev/"

[etherscan]
unichain_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://unichain-sepolia.blockscout.com/api" }
